version: '3.8'
services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://splitxpense:splitxpense@postgres:5432/splitxpense
      REDIS_URL: redis://redis:6379

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: splitxpense
      POSTGRES_PASSWORD: splitxpense
      POSTGRES_DB: splitxpense
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
